name: Karagram Windows Build.

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!docs/building-win*.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/karagram-win.yml'
      - 'lib/xdg/**'
      - 'snap/**'
      - 'Telegram/build/docker/**'
      - 'Telegram/Resources/uwp/**'
      - 'Telegram/SourceFiles/platform/linux/**'
      - 'Telegram/SourceFiles/platform/mac/**'
      - 'Telegram/Telegram/**'
      - 'Telegram/configure.sh'
      - 'Telegram/Telegram.plist'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!docs/building-win*.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/karagram-win.yml'
      - 'lib/xdg/**'
      - 'snap/**'
      - 'Telegram/build/docker/**'
      - 'Telegram/Resources/uwp/**'
      - 'Telegram/SourceFiles/platform/linux/**'
      - 'Telegram/SourceFiles/platform/mac/**'
      - 'Telegram/Telegram/**'
      - 'Telegram/configure.sh'
      - 'Telegram/Telegram.plist'

jobs:

  windows:
    name: Windows
    runs-on: ${{ (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/nightly') && 'depot-windows-latest-16' || 'windows-latest' }}

    strategy:
      matrix:
        arch: [x64]
        qt: [qt6]

    env:
      UPLOAD_ARTIFACT: "true"
      ONLY_CACHE: "false"
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir "%GITHUB_WORKSPACE%\TBuild"
          mkdir "%GITHUB_WORKSPACE%\TBuild\Libraries"

      - name: Clone.
        uses: actions/checkout@v7
        with:
          path: TBuild/custom-messenger-client

      - name: First set up.
        shell: bash
        run: |
          DOCPATH="$GITHUB_WORKSPACE/TBuild/custom-messenger-client/docs/building-win.md"
          echo "Looking for SDK version in $DOCPATH"
          SDK="$(grep "SDK version" "$DOCPATH" | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum "$GITHUB_WORKSPACE/TBuild/custom-messenger-client/$PREPARE_PATH" | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "you@example.com"
          git config --global user.name "Sample"

      - uses: Eden-CI/msvc-dev-cmd@master
        name: Native Tools Command Prompt.
        with:
          arch: ${{ matrix.arch }}
          sdk: ${{ env.SDK }}
          toolset: 14.44

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        id: cache-third-party
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}\TBuild\ThirdParty
          key: ${{ runner.OS }}-${{ runner.arch }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ runner.arch }}-third-party-

      - name: Libraries cache.
        id: cache-libs
        uses: actions/cache@v6
        with:
          path: |
            ${{ github.workspace }}\TBuild\Libraries\win64\*
            !${{ github.workspace }}\TBuild\Libraries\win64\cache_keys
            !${{ github.workspace }}\TBuild\Libraries\win64\[qQ]t[_-]*
            ${{ github.workspace }}\TBuild\Libraries\win64\cache_keys\*
            !${{ github.workspace }}\TBuild\Libraries\win64\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-libs-

      - name: Qt cache.
        id: cache-qt
        uses: actions/cache@v6
        with:
          path: |
            ${{ github.workspace }}\TBuild\Libraries\win64\[qQ]t[_-]*
            ${{ github.workspace }}\TBuild\Libraries\win64\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-${{ matrix.qt || 'qt' }}-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-${{ matrix.qt || 'qt' }}-

      - name: Libraries.
        run: |
          "%GITHUB_WORKSPACE%\TBuild\custom-messenger-client\Telegram\build\prepare\win.bat" skip-release silent ${{ matrix.qt }}

      - name: Read configuration matrix.
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          ARTIFACT_NAME="Karagram $ARCH ${{ matrix.qt }}"
          echo "TDESKTOP_BUILD_ARCH=$ARCH" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Karagram build with custom backend.
        if: env.ONLY_CACHE == 'false'
        run: |
          cd "%GITHUB_WORKSPACE%\TBuild\custom-messenger-client\Telegram"

          call configure.bat ^
          %TDESKTOP_BUILD_ARCH% ^
          ${{ matrix.qt }} ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON ^
          -D DESKTOP_APP_CUSTOM_BACKEND=ON

          cmake --build "%GITHUB_WORKSPACE%\TBuild\custom-messenger-client\out" --config Release --parallel

      - name: Move artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          set OUT=%GITHUB_WORKSPACE%\TBuild\custom-messenger-client\out\Release
          mkdir artifact
          move %OUT%\Telegram.exe artifact\
          if exist %OUT%\Updater.exe move %OUT%\Updater.exe artifact\
          if exist %OUT%\*.dll copy %OUT%\*.dll artifact\

      - uses: actions/upload-artifact@v7
        name: Upload Karagram artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact\
          retention-days: 30
