name: Build.

on:
  push:
    branches: [main, custom-backend]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '!docs/building-win*.md'
      - 'changelog.txt'
      - 'LEGAL'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/build.yml'
  workflow_dispatch:

jobs:

  windows:
    name: Windows
    runs-on: windows-latest

    env:
      UPLOAD_ARTIFACT: "true"
      ONLY_CACHE: "false"
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries\win64>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v7
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: First set up.
        shell: bash
        run: |
          DOCPATH=$TBUILD/$REPO_NAME/docs/building-win.md
          SDK="$(grep "SDK version" $DOCPATH | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "ci@custom-messenger.dev"
          git config --global user.name "Custom Messenger CI"

      - uses: Eden-CI/msvc-dev-cmd@master
        name: Native Tools Command Prompt.
        with:
          arch: x64
          sdk: ${{ env.SDK }}
          toolset: "14.44"

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        id: cache-third-party
        uses: actions/cache@v6
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-third-party-

      - name: Libraries cache.
        id: cache-libs
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\*
            !${{ env.LibrariesPath }}\cache_keys
            !${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\*
            !${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-libs-

      - name: Qt cache.
        id: cache-qt
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-x64-qt-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-qt-

      - name: Libraries.
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat skip-release silent

      - name: Free up some disk space.
        shell: bash
        run: find $LibrariesPath '(' '(' ! '(' -name '*.lib' -o -name '*.a' -o -name '*.exe' -o -name '*.h' -o -name '*.hpp' -o -name '*.inc' -o -name '*.cmake' -o -path '*/include/*' -o -path '*/objects-*' -o -path '*/cache_keys/*' -o -path '*/patches/*' ')' -type f ')' -o -empty ')' -delete

      - name: Configure.
        if: env.ONLY_CACHE == 'false'
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          call configure.bat ^
          x64 ^
          -D TDESKTOP_API_ID=0 ^
          -D TDESKTOP_API_HASH= ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D CMAKE_COMPILE_WARNING_AS_ERROR=ON ^
          -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT= ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON

      - name: Build.
        if: env.ONLY_CACHE == 'false'
        run: |
          cmake --build %TBUILD%\%REPO_NAME%\out --config Release --parallel

      - name: Collect artifacts.
        if: (env.UPLOAD_ARTIFACT == 'true')
        shell: pwsh
        run: |
          $outDir = "$env:TBUILD\$env:REPO_NAME\out\Release"
          $artDir = "artifact"

          New-Item -ItemType Directory -Path $artDir -Force | Out-Null

          Copy-Item "$outDir\Telegram.exe" $artDir -ErrorAction Stop

          Get-ChildItem "$outDir\*.dll" | ForEach-Object {
            Copy-Item $_.FullName $artDir
          }

          foreach ($sub in @("platforms","styles","imageformats","bearer","tls","iconengines","printsupport")) {
            $src = "$outDir\$sub"
            if (Test-Path $src) {
              $dest = "$artDir\$sub"
              New-Item -ItemType Directory -Path $dest -Force | Out-Null
              Get-ChildItem "$src\*.dll" | ForEach-Object {
                Copy-Item $_.FullName $dest
              }
            }
          }

          if (Test-Path "$env:TBUILD\$env:REPO_NAME\Telegram\Resources\art\icon.ico") {
            Copy-Item "$env:TBUILD\$env:REPO_NAME\Telegram\Resources\art\icon.ico" $artDir
          }

          Get-ChildItem $artDir -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - uses: actions/upload-artifact@v7
        name: Upload artifact.
        if: (env.UPLOAD_ARTIFACT == 'true')
        with:
          name: CustomMessenger-Windows-x64-Release
          path: artifact\
          retention-days: 30
